apiVersion: apps/v1
kind: Deployment
metadata:
  name: tax-portal
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tax-portal
  template:
    metadata:
      labels:
        app: tax-portal
    spec:
      containers:
        - name: tax-portal
          image: myorg/tax-portal:v5.2.0
          ports:
            - containerPort: 8080
          env:
            - name: LOG_PII_MASKING_ENABLED
              value: "true"
            - name: LOG_SENSITIVE_FIELDS
              value: "name,ssn,national_id,address"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi