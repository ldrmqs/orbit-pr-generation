apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-helpdesk
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: it-helpdesk
  template:
    metadata:
      labels:
        app: it-helpdesk
    spec:
      containers:
        - name: it-helpdesk
          image: myorg/it-helpdesk:v4.2.0
          ports:
            - containerPort: 9090
          env:
            - name: ENABLE_PII_REDACTION
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: pii-redactor-sidecar
          image: myorg/pii-redactor:v1.0.1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi